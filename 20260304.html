    <div class="content">
        <p>
            やわらかで暖かな陽に包まれる</br>
そんな日には草や花、虫たちが</br>
意気揚々と楽しげに見える。</br></br>

春がすぐそこまできている</br></br>

どことなく胸が躍り</br>
待ちきれない子供のように</br>
今日も外を見渡して</br>
春の気配に喜びを感じている。</br></br>

木蓮の蕾が美しく立ち並ぶ</br>
開花が待ち遠しい。</br></br>

春が訪れたその日には</br>
木蓮の花の甘い香りのするティーで</br>
静かに、はじまりを迎えよう。</br></br>
        </p>
